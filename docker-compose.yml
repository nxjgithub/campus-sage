services:
  qdrant:
    image: qdrant/qdrant:v1.9.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:86-1.8
    ports:
      - "8080:80"
      - "9000:9000"
    volumes:
      - tei_data:/data
    shm_size: "1g"
    gpus: all
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    command:
      - "--model-id"
      - "${TEI_MODEL_ID:-BAAI/bge-m3}"
      - "--auto-truncate"
      - "--max-client-batch-size"
      - "${TEI_MAX_CLIENT_BATCH_SIZE:-8}"
      - "--max-concurrent-requests"
      - "${TEI_MAX_CONCURRENT_REQUESTS:-64}"

volumes:
  qdrant_data:
  redis_data:
  tei_data:
