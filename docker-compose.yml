services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${CSAGE_DATABASE_URL_INTERNAL:-mysql+pymysql://${CSAGE_MYSQL_USER:-csage}:csage123@mysql:3306/${CSAGE_MYSQL_DATABASE:-csage}?charset=utf8mb4}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      INGEST_QUEUE_ENABLED: "true"
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-simple}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL_INTERNAL:-http://tei:80/v1}
      EMBEDDING_API_PATH: ${EMBEDDING_API_PATH_INTERNAL:-/embeddings}
      NO_PROXY: ${NO_PROXY_INTERNAL:-mysql,qdrant,tei,redis,localhost,127.0.0.1}
      no_proxy: ${NO_PROXY_INTERNAL:-mysql,qdrant,tei,redis,localhost,127.0.0.1}
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000" ]
    ports:
      - "8010:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${CSAGE_DATABASE_URL_INTERNAL:-mysql+pymysql://${CSAGE_MYSQL_USER:-csage}:csage123@mysql:3306/${CSAGE_MYSQL_DATABASE:-csage}?charset=utf8mb4}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      INGEST_QUEUE_ENABLED: "true"
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-simple}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL_INTERNAL:-http://tei:80/v1}
      EMBEDDING_API_PATH: ${EMBEDDING_API_PATH_INTERNAL:-/embeddings}
      NO_PROXY: ${NO_PROXY_INTERNAL:-mysql,qdrant,tei,redis,localhost,127.0.0.1}
      no_proxy: ${NO_PROXY_INTERNAL:-mysql,qdrant,tei,redis,localhost,127.0.0.1}
    command: [ "python", "-m", "app.ingest.worker_runner", "--queue", "ingest" ]
    volumes:
      - ./data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
  mysql:
    image: mysql:8.4
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--innodb-buffer-pool-size=128M"
      - "--innodb-log-buffer-size=16M"
      - "--performance-schema=OFF"
    environment:
      MYSQL_DATABASE: ${CSAGE_MYSQL_DATABASE:-csage}
      MYSQL_USER: ${CSAGE_MYSQL_USER:-csage}
      MYSQL_PASSWORD: ${CSAGE_MYSQL_PASSWORD:-csage123}
      MYSQL_ROOT_PASSWORD: ${CSAGE_MYSQL_ROOT_PASSWORD:-csage_root}
    ports:
      - "${CSAGE_MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${CSAGE_MYSQL_ROOT_PASSWORD:-csage_root}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
  qdrant:
    image: qdrant/qdrant:v1.9.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:86-1.8
    ports:
      - "8080:80"
      - "9000:9000"
    volumes:
      - tei_data:/data
    shm_size: "1g"
    gpus: all
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    command:
      - "--model-id"
      - "${TEI_MODEL_ID:-BAAI/bge-m3}"
      - "--auto-truncate"
      - "--max-client-batch-size"
      - "${TEI_MAX_CLIENT_BATCH_SIZE:-8}"
      - "--max-concurrent-requests"
      - "${TEI_MAX_CONCURRENT_REQUESTS:-64}"

volumes:
  mysql_data:
  qdrant_data:
  redis_data:
  tei_data:
