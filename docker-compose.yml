services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      INGEST_QUEUE_ENABLED: "true"
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-simple}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL_INTERNAL:-http://tei:80/v1}
      EMBEDDING_API_PATH: ${EMBEDDING_API_PATH_INTERNAL:-/embeddings}
      NO_PROXY: ${NO_PROXY_INTERNAL:-qdrant,tei,redis,localhost,127.0.0.1}
      no_proxy: ${NO_PROXY_INTERNAL:-qdrant,tei,redis,localhost,127.0.0.1}
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000" ]
    ports:
      - "8010:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
      - redis
      - tei
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      INGEST_QUEUE_ENABLED: "true"
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-simple}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL_INTERNAL:-http://tei:80/v1}
      EMBEDDING_API_PATH: ${EMBEDDING_API_PATH_INTERNAL:-/embeddings}
      NO_PROXY: ${NO_PROXY_INTERNAL:-qdrant,tei,redis,localhost,127.0.0.1}
      no_proxy: ${NO_PROXY_INTERNAL:-qdrant,tei,redis,localhost,127.0.0.1}
    command: [ "python", "-m", "app.ingest.worker_runner", "--queue", "ingest" ]
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
      - redis
      - tei
  qdrant:
    image: qdrant/qdrant:v1.9.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:86-1.8
    ports:
      - "8080:80"
      - "9000:9000"
    volumes:
      - tei_data:/data
    shm_size: "1g"
    gpus: all
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    command:
      - "--model-id"
      - "${TEI_MODEL_ID:-BAAI/bge-m3}"
      - "--auto-truncate"
      - "--max-client-batch-size"
      - "${TEI_MAX_CLIENT_BATCH_SIZE:-8}"
      - "--max-concurrent-requests"
      - "${TEI_MAX_CONCURRENT_REQUESTS:-64}"

volumes:
  qdrant_data:
  redis_data:
  tei_data:
